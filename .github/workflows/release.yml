name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish Release'
        required: true
        default: false
        type: boolean
      release_tag:
        description: 'Release Tag'
        required: false
        default: ''
        type: string
      release_title:
        description: 'Release Title'
        required: false
        default: 'Manual Release Build'
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_REPO: ${{ github.repository }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - env:
          URL_KAGUYA_1: ${{ secrets.EASTER_EGG_URL_KAGUYA_1 }}
          URL_KAGUYA_2: ${{ secrets.EASTER_EGG_URL_KAGUYA_2 }}
          URL_YACHIYO_1: ${{ secrets.EASTER_EGG_URL_YACHIYO_1 }}
          URL_YACHIYO_2: ${{ secrets.EASTER_EGG_URL_YACHIYO_2 }}
        run: |
          echo "easterEggUrl.kaguya_1=${URL_KAGUYA_1}" >> local.properties
          echo "easterEggUrl.kaguya_2=${URL_KAGUYA_2}" >> local.properties
          echo "easterEggUrl.yachiyo_1=${URL_YACHIYO_1}" >> local.properties
          echo "easterEggUrl.yachiyo_2=${URL_YACHIYO_2}" >> local.properties

      - env:
          LOCAL_GRADLE_KTS_CONTENT: ${{ vars.LOCAL_GRADLE_KTS }}
        run: |
          if [ -n "$LOCAL_GRADLE_KTS_CONTENT" ]; then
            printf "%s\n" "$LOCAL_GRADLE_KTS_CONTENT" > local.gradle.kts
            echo "=========================================================="
            echo "   AUDIT LOG: local.gradle.kts"
            echo "=========================================================="
            cat local.gradle.kts
            echo "=========================================================="
          else
            echo "// Stub" > local.gradle.kts
          fi

      - run: chmod +x gradlew

      - run: ./gradlew detekt

      - run: ./gradlew assembleRelease

      - name: Get build-tools version
        run: |
          BUILD_TOOL_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          echo "Detected build-tools version: $BUILD_TOOL_VERSION"
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV

      - name: Sign APK
        env:
          SIGNING_KEY_VAL: ${{ secrets.SIGNING_KEY }}
        if: ${{ env.SIGNING_KEY_VAL != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.keystore
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/speculonic-release-aligned.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks release.keystore --ks-key-alias "${{ secrets.SIGNING_KEY_ALIAS }}" --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --out app/build/outputs/apk/release/speculonic-release.apk app/build/outputs/apk/release/speculonic-release-aligned.apk
          rm -f release.keystore
          rm -f app/build/outputs/apk/release/speculonic-release-aligned.apk
          rm -f app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Prepare APK outputs
        run: |
          if [ -f app/build/outputs/apk/release/speculonic-release.apk ]; then
            echo "Release APK is signed and ready."
          else
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/speculonic-release-unsigned.apk
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/speculonic-release*.apk

      - if: ${{ github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('v0.9.0-build{0}', github.run_number) }}
          name: ${{ github.event.inputs.release_title || format('Manual Build {0}', github.run_number) }}
          files: app/build/outputs/apk/release/speculonic-release*.apk
          generate_release_notes: true
